<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Name</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a1628;
      color: #e8f0fe;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #112240;
      border: 1px solid #1e3a5f;
      border-radius: 20px;
      padding: 3rem 2.5rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
    }

    .photo {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #4a9eff;
      margin-bottom: 1.5rem;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    /* Remove this div once you add a real photo */
    .photo-placeholder {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background: #1e3a5f;
      border: 4px solid #4a9eff;
      margin: 0 auto 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      color: #4a9eff;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 0.3rem;
    }

    .title {
      font-size: 0.9rem;
      color: #4a9eff;
      font-weight: 400;
      margin-bottom: 1.5rem;
    }

    .blurb {
      font-size: 0.95rem;
      color: #a8c0e0;
      line-height: 1.75;
      margin-bottom: 2rem;
    }

    .linkedin-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: #4a9eff;
      color: #fff;
      padding: 0.75rem 1.75rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s;
    }

    .linkedin-btn:hover {
      background: #2d7dd2;
      transform: translateY(-2px);
    }

    .linkedin-btn svg {
      width: 18px;
      height: 18px;
      fill: white;
    }
  </style>
</head>
<body>

  <div class="card">

    <!-- Replace this placeholder with your actual photo:
         <img src="photo.jpg" alt="Your Name" class="photo"> -->
    <div class="photo-placeholder">Your Photo</div>

    <h1>Your Name</h1>
    <p class="title">Your Job Title / Field</p>

    <p class="blurb">
      Write a short 2–3 sentence blurb about yourself here. 
      What do you do, what are you passionate about, and what 
      are you currently working on or looking for?
    </p>

    <a href="https://linkedin.com/in/yourprofile" target="_blank" class="linkedin-btn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
      </svg>
      Connect on LinkedIn
    </a>

  </div>

</body>
</html>
